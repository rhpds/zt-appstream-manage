virtualmachines:
  - name: "rhel"
    image: "rhel-10-2-eus-06-08-26"
    bootloader: efi
    memory: "8G"
    cores: 1
    image_size: "40G"
    register_satellite: false
    # packages:
    # - tree
    # - tmux
    tags:
      - key: "AnsibleGroup"
        value: "bastions"
    networks:
      - default

